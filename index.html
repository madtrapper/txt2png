<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #e8e8ed;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
    padding: 20px;
  }

  .phone-frame {
    width: 393px;
    height: 852px;
    background: #fff;
    border-radius: 44px;
    border: 3px solid #d1d1d6;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    position: relative;
  }

  /* Status bar */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 32px 10px;
    font-size: 16px;
    font-weight: 600;
    color: #000;
    flex-shrink: 0;
  }

  .status-bar-left {
    display: flex;
    align-items: center;
    gap: 4px;
    min-width: 80px;
  }

  .status-bar-right {
    display: flex;
    align-items: center;
    gap: 6px;
    min-width: 80px;
    justify-content: flex-end;
  }

  /* Signal bars */
  .signal-bars { display: flex; gap: 1.5px; align-items: flex-end; }
  .signal-bars span {
    display: block;
    width: 3.5px;
    background: #000;
    border-radius: 1px;
  }
  .signal-bars span:nth-child(1) { height: 4px; }
  .signal-bars span:nth-child(2) { height: 6px; opacity: 0.35; }
  .signal-bars span:nth-child(3) { height: 9px; opacity: 0.35; }
  .signal-bars span:nth-child(4) { height: 12px; opacity: 0.35; }

  /* WiFi icon */
  .wifi-icon { width: 16px; height: 12px; }

  /* Battery */
  .battery {
    display: flex;
    align-items: center;
    gap: 1px;
    font-size: 13px;
    font-weight: 400;
    color: #000;
  }
  .battery-shell {
    width: 27px; height: 13px;
    border: 1.5px solid #000;
    border-radius: 4px;
    position: relative;
    display: flex;
    align-items: center;
    padding: 2px;
  }
  .battery-shell::after {
    content: '';
    position: absolute;
    right: -3px;
    width: 2px; height: 5px;
    background: #000;
    border-radius: 0 1px 1px 0;
    opacity: 0.4;
  }
  .battery-fill {
    width: 90%;
    height: 100%;
    background: #000;
    border-radius: 1.5px;
  }

  /* Nav bar */
  .nav-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 2px 14px 6px;
    flex-shrink: 0;
  }

  .nav-back-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 36px; height: 36px;
    background: #e8e8ed;
    border-radius: 50%;
    border: none;
    cursor: pointer;
  }
  .nav-back-btn svg { width: 11px; height: 18px; color: #000; }

  .nav-right-group {
    display: flex;
    align-items: center;
    gap: 2px;
    background: #e8e8ed;
    border-radius: 22px;
    padding: 4px 6px;
  }
  .nav-icon-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 34px; height: 34px;
    background: none;
    border: none;
    cursor: pointer;
    border-radius: 50%;
  }
  .nav-icon-btn svg { width: 20px; height: 20px; color: #000; }

  /* Content area */
  .note-content-wrapper {
    flex: 1;
    overflow-y: auto;
    padding: 12px 22px 20px;
  }

  .note-title {
    font-size: 28px;
    font-weight: 700;
    color: #000;
    width: 100%;
    background: none;
    border: none;
    outline: none;
    resize: none;
    font-family: inherit;
    line-height: 1.3;
    padding: 4px 0;
  }
  .note-title::placeholder { color: #c7c7cc; }

  .note-body {
    font-size: 17px;
    color: #000;
    width: 100%;
    background: none;
    border: none;
    outline: none;
    resize: none;
    font-family: inherit;
    line-height: 1.5;
    min-height: 400px;
    padding: 2px 0;
  }
  .note-body::placeholder { color: #c7c7cc; }

  /* Bottom toolbar */
  .bottom-toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 14px 30px;
    flex-shrink: 0;
  }

  .toolbar-left {
    display: flex;
    align-items: center;
    gap: 2px;
    background: #e8e8ed;
    border-radius: 22px;
    padding: 6px 10px;
  }
  .toolbar-icon-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 34px; height: 34px;
    background: none;
    border: none;
    cursor: pointer;
  }
  .toolbar-icon-btn svg { width: 22px; height: 22px; color: #000; }


  /* Home indicator */
  .home-indicator {
    width: 134px;
    height: 5px;
    background: #000;
    border-radius: 3px;
    margin: 0 auto 8px;
    opacity: 0.2;
  }

  /* Export button — in toolbar right */
  .export-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 44px; height: 44px;
    background: #e8e8ed;
    border-radius: 50%;
    border: none;
    cursor: pointer;
  }
  .export-btn svg { width: 22px; height: 22px; color: #000; }
  .export-btn:active { opacity: 0.5; }

  /* Toast */
  .toast {
    position: fixed;
    top: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(-100px);
    background: #333;
    color: #fff;
    padding: 12px 24px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 500;
    opacity: 0;
    transition: all 0.3s ease;
    z-index: 200;
    pointer-events: none;
  }
  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

  /* Hide all scrollbars */
  .note-content-wrapper::-webkit-scrollbar,
  .phone-frame::-webkit-scrollbar,
  .note-title::-webkit-scrollbar,
  .note-body::-webkit-scrollbar { width: 0; display: none; }
  .note-content-wrapper, .phone-frame, .note-title, .note-body {
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
</style>
</head>
<body>

<div class="phone-frame">
  <!-- Status Bar -->
  <div class="status-bar">
    <div class="status-bar-left">
      <span id="clock">11:14</span>
      <!-- Silent mode bell icon -->
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M13.73 21a2 2 0 01-3.46 0"/>
        <path d="M18.63 13A17.89 17.89 0 0118 8"/>
        <path d="M6.26 6.26A5.86 5.86 0 006 8c0 7-3 9-3 9h14"/>
        <line x1="1" y1="1" x2="23" y2="23"/>
      </svg>
    </div>
    <div class="status-bar-right">
      <div class="signal-bars">
        <span></span><span></span><span></span><span></span>
      </div>
      <!-- WiFi icon -->
      <svg class="wifi-icon" viewBox="0 0 24 18" fill="#000">
        <path d="M12 18c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1z"/>
        <path d="M8.53 13.47a5.003 5.003 0 016.94 0" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round"/>
        <path d="M5.11 10.05a9.003 9.003 0 0113.78 0" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round"/>
        <path d="M1.69 6.63a13.003 13.003 0 0120.62 0" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <div class="battery">
        <span>91</span>
        <div class="battery-shell">
          <div class="battery-fill"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Nav Bar -->
  <div class="nav-bar">
    <button class="nav-back-btn">
      <svg viewBox="0 0 12 20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="10,2 2,10 10,18"/>
      </svg>
    </button>
    <div class="nav-right-group">
      <!-- Undo -->
      <button class="nav-icon-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 10h10a5 5 0 015 5v0a5 5 0 01-5 5H8"/>
          <polyline points="7,6 3,10 7,14"/>
        </svg>
      </button>
      <!-- Share -->
      <button class="nav-icon-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 3v12"/>
          <polyline points="6,8 12,3 18,8"/>
          <path d="M6 14v4a1 1 0 001 1h10a1 1 0 001-1v-4"/>
        </svg>
      </button>
      <!-- More (three dots horizontal) -->
      <button class="nav-icon-btn">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <circle cx="6" cy="12" r="2"/>
          <circle cx="12" cy="12" r="2"/>
          <circle cx="18" cy="12" r="2"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Note Content -->
  <div class="note-content-wrapper">
    <textarea class="note-title" id="note-title" placeholder="Title" rows="1"></textarea>
    <textarea class="note-body" id="note-body" placeholder="Start typing or paste text here..."></textarea>
  </div>

  <!-- Bottom Toolbar -->
  <div class="bottom-toolbar">
    <div class="toolbar-left">
      <!-- Formatting (Aa with lines) -->
      <button class="toolbar-icon-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="6" cy="8" r="1.5" fill="currentColor" stroke="none"/>
          <line x1="11" y1="8" x2="22" y2="8"/>
          <circle cx="6" cy="14" r="1.5" fill="currentColor" stroke="none"/>
          <line x1="11" y1="14" x2="22" y2="14"/>
          <circle cx="6" cy="20" r="1.5" fill="currentColor" stroke="none"/>
          <line x1="11" y1="20" x2="19" y2="20"/>
        </svg>
      </button>
      <!-- Attachment (paperclip) -->
      <button class="toolbar-icon-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
        </svg>
      </button>
      <!-- Markup (A in circle) -->
      <button class="toolbar-icon-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="12" r="10"/>
          <path d="M9 16l3-9 3 9"/>
          <line x1="10" y1="14" x2="14" y2="14"/>
        </svg>
      </button>
      <!-- Link -->
      <button class="toolbar-icon-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/>
          <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/>
        </svg>
      </button>
    </div>
    <button class="export-btn" id="export-btn" title="Export PNG">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
        <polyline points="7,10 12,15 17,10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
    </button>
  </div>

  <div class="home-indicator"></div>
</div>


<div class="toast" id="toast"></div>

<script>
  // Update clock
  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent =
      now.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
  }
  updateClock();
  setInterval(updateClock, 60000);

  // Auto-resize textareas
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = el.scrollHeight + 'px';
  }

  const noteTitle = document.getElementById('note-title');
  const noteBody = document.getElementById('note-body');

  noteTitle.addEventListener('input', () => autoResize(noteTitle));
  noteBody.addEventListener('input', () => autoResize(noteBody));

  // Toast notification
  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }

  // Export to PNG — text only, no UI chrome
  document.getElementById('export-btn').addEventListener('click', async () => {
    const container = document.createElement('div');
    container.style.cssText = `
      position: absolute; left: -9999px; top: 0;
      width: 390px; background: #fff; padding: 12px 10px;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
    `;

    if (noteTitle.value.trim()) {
      const titleDiv = document.createElement('div');
      titleDiv.textContent = noteTitle.value;
      titleDiv.style.cssText = `
        font-size: 28px; font-weight: 700; color: #000;
        line-height: 1.3; padding-bottom: 8px;
        white-space: pre-wrap; word-break: break-word;
      `;
      container.appendChild(titleDiv);
    }

    if (noteBody.value.trim()) {
      const bodyDiv = document.createElement('div');
      bodyDiv.textContent = noteBody.value;
      bodyDiv.style.cssText = `
        font-size: 17px; color: #000; line-height: 1.5;
        white-space: pre-wrap; word-break: break-word;
      `;
      container.appendChild(bodyDiv);
    }

    if (!noteTitle.value.trim() && !noteBody.value.trim()) {
      showToast('Nothing to export');
      return;
    }

    document.body.appendChild(container);

    try {
      const canvas = await html2canvas(container, {
        backgroundColor: '#fff',
        scale: 2,
        useCORS: true,
        logging: false,
      });

      container.remove();

      const link = document.createElement('a');
      link.download = `note-${Date.now()}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();

      showToast('PNG exported!');
    } catch (err) {
      container.remove();
      showToast('Export failed: ' + err.message);
    }
  });
</script>
</body>
</html>
