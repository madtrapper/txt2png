<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #e8e8ed;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
    padding: 20px;
  }

  .phone-frame {
    width: 393px;
    height: 852px;
    background: #fff;
    border-radius: 0;
    border: 3px solid #d1d1d6;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    position: relative;
  }

  @media (max-width: 500px) {
    body { padding: 0; background: #fff; }
    .phone-frame {
      width: 100%;
      height: 100vh;
      height: 100dvh;
      border: none;
      box-shadow: none;
    }
  }

  /* Content area */
  .note-content-wrapper { flex: 1; overflow-y: auto; padding: 12px 22px 20px; }

  .note-title {
    font-size: 28px; font-weight: 700; color: #000; width: 100%;
    background: none; border: none; outline: none; resize: none;
    font-family: inherit; line-height: 1.3; padding: 4px 0;
  }
  .note-title::placeholder { color: #c7c7cc; }

  .note-body-segment {
    font-size: 17px; color: #000; width: 100%;
    background: none; border: none; outline: none; resize: none;
    font-family: inherit; line-height: 1.5; padding: 2px 0;
    display: block;
  }
  .note-body-segment::placeholder { color: #c7c7cc; }
  .note-body-segment:first-of-type { min-height: 100px; }

  /* Inline images */
  .img-wrapper { position: relative; display: block; padding: 6px 0; }
  .img-wrapper img { max-width: 100%; border-radius: 8px; display: block; }
  .img-wrapper .img-remove {
    position: absolute; top: 12px; right: 6px;
    width: 24px; height: 24px; background: rgba(0,0,0,0.5); color: #fff;
    border: none; border-radius: 50%; cursor: pointer; font-size: 14px;
    line-height: 24px; text-align: center;
  }

  /* Bottom toolbar */
  .bottom-toolbar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 14px 30px; flex-shrink: 0; position: relative;
    border-top: 0.5px solid #d1d1d6;
  }
  .toolbar-left {
    display: flex; align-items: center; gap: 2px;
    background: #e8e8ed; border-radius: 22px; padding: 6px 10px;
  }
  .toolbar-icon-btn {
    display: flex; align-items: center; justify-content: center;
    width: 34px; height: 34px; background: none; border: none; cursor: pointer; position: relative;
  }
  .toolbar-icon-btn svg { width: 22px; height: 22px; color: #000; }
  .toolbar-icon-btn:active { opacity: 0.5; }

  .export-btn {
    display: flex; align-items: center; justify-content: center;
    width: 44px; height: 44px; background: #e8e8ed; border-radius: 50%; border: none; cursor: pointer;
  }
  .export-btn svg { width: 22px; height: 22px; color: #000; }
  .export-btn:active { opacity: 0.5; }

  /* Popup menus */
  .popup-menu {
    position: absolute; bottom: 60px; left: 14px; background: #fff;
    border-radius: 14px; box-shadow: 0 4px 24px rgba(0,0,0,0.18);
    padding: 6px 0; display: none; z-index: 50; min-width: 200px;
  }
  .popup-menu.show { display: block; }
  .popup-menu-item {
    display: flex; align-items: center; gap: 12px; padding: 10px 16px;
    font-size: 16px; color: #000; background: none; border: none;
    width: 100%; cursor: pointer; font-family: inherit; text-align: left;
  }
  .popup-menu-item:hover { background: #f2f2f7; }
  .popup-menu-item .item-icon { font-size: 18px; width: 24px; text-align: center; }
  .popup-menu-item.active { color: #007aff; }
  .popup-separator { height: 0.5px; background: #d1d1d6; margin: 4px 0; }

  .toast {
    position: fixed; top: 30px; left: 50%;
    transform: translateX(-50%) translateY(-100px);
    background: #333; color: #fff; padding: 12px 24px; border-radius: 12px;
    font-size: 15px; font-weight: 500; opacity: 0;
    transition: all 0.3s ease; z-index: 200; pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* Hide all scrollbars */
  .note-content-wrapper::-webkit-scrollbar,
  .phone-frame::-webkit-scrollbar,
  .note-title::-webkit-scrollbar,
  .note-body-segment::-webkit-scrollbar { width: 0; display: none; }
  .note-content-wrapper, .phone-frame, .note-title, .note-body-segment {
    scrollbar-width: none; -ms-overflow-style: none;
  }
</style>
</head>
<body>

<div class="phone-frame">
  <!-- Note Content -->
  <div class="note-content-wrapper" id="note-content-wrapper">
    <textarea class="note-title" id="note-title" placeholder="Title" rows="1"></textarea>
    <div id="note-body-container">
      <textarea class="note-body-segment" placeholder="Start typing or paste text here..." rows="1"></textarea>
    </div>
  </div>

  <!-- Bottom Toolbar -->
  <div class="bottom-toolbar">
    <div class="toolbar-left">
      <button class="toolbar-icon-btn" id="btn-undo" title="Undo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 10h10a5 5 0 015 5v0a5 5 0 01-5 5H8"/>
          <polyline points="7,6 3,10 7,14"/>
        </svg>
      </button>
      <button class="toolbar-icon-btn" id="btn-format" title="List formatting">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="6" cy="8" r="1.5" fill="currentColor" stroke="none"/>
          <line x1="11" y1="8" x2="22" y2="8"/>
          <circle cx="6" cy="14" r="1.5" fill="currentColor" stroke="none"/>
          <line x1="11" y1="14" x2="22" y2="14"/>
          <circle cx="6" cy="20" r="1.5" fill="currentColor" stroke="none"/>
          <line x1="11" y1="20" x2="19" y2="20"/>
        </svg>
      </button>
      <button class="toolbar-icon-btn" id="btn-attach" title="Attach image">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
        </svg>
      </button>
      <button class="toolbar-icon-btn" id="btn-fontsize" title="Font size">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="12" r="10"/>
          <path d="M9 16l3-9 3 9"/>
          <line x1="10" y1="14" x2="14" y2="14"/>
        </svg>
      </button>
      <button class="toolbar-icon-btn" id="btn-link" title="Insert link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/>
          <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/>
        </svg>
      </button>
    </div>
    <button class="export-btn" id="export-btn" title="Export PNG">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
        <polyline points="7,10 12,15 17,10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
    </button>

    <div class="popup-menu" id="popup-format">
      <button class="popup-menu-item" data-format="bullet"><span class="item-icon">•</span>Bullet List</button>
      <button class="popup-menu-item" data-format="number"><span class="item-icon">1.</span>Numbered List</button>
      <button class="popup-menu-item" data-format="checklist"><span class="item-icon">☐</span>Checklist</button>
      <div class="popup-separator"></div>
      <button class="popup-menu-item" data-format="none"><span class="item-icon">⌫</span>Remove Formatting</button>
    </div>

    <div class="popup-menu" id="popup-fontsize">
      <button class="popup-menu-item" data-size="15"><span class="item-icon" style="font-size:13px">A</span>Small</button>
      <button class="popup-menu-item active" data-size="17"><span class="item-icon" style="font-size:16px">A</span>Medium</button>
      <button class="popup-menu-item" data-size="20"><span class="item-icon" style="font-size:19px">A</span>Large</button>
      <button class="popup-menu-item" data-size="24"><span class="item-icon" style="font-size:22px">A</span>Extra Large</button>
    </div>
  </div>

</div>

<input type="file" id="file-input" accept="image/*" multiple style="display:none">
<div class="toast" id="toast"></div>

<script>
  const noteTitle = document.getElementById('note-title');
  const bodyContainer = document.getElementById('note-body-container');
  const fileInput = document.getElementById('file-input');
  let activeSegment = bodyContainer.querySelector('.note-body-segment');
  let currentFontSize = '17px';

  // Auto-resize
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = el.scrollHeight + 'px';
  }
  noteTitle.addEventListener('input', () => autoResize(noteTitle));

  // Toast
  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }

  // ---- Body segment management ----
  function createSegment(text) {
    const ta = document.createElement('textarea');
    ta.className = 'note-body-segment';
    ta.rows = 1;
    ta.value = text || '';
    ta.style.fontSize = currentFontSize;
    setupSegment(ta);
    return ta;
  }

  function setupSegment(ta) {
    ta.addEventListener('input', () => autoResize(ta));
    ta.addEventListener('focus', () => { activeSegment = ta; });
    ta.addEventListener('keydown', handleListKeydown);
    ta.addEventListener('keydown', handleImageDelete);
    ta.addEventListener('click', handleChecklistToggle);
    requestAnimationFrame(() => autoResize(ta));
  }

  // Backspace at start or Delete at end → remove adjacent image and merge segments
  function handleImageDelete(e) {
    const ta = e.target;
    if (e.key === 'Backspace' && ta.selectionStart === 0 && ta.selectionEnd === 0) {
      const prev = ta.previousElementSibling;
      if (prev && prev.classList.contains('img-wrapper')) {
        e.preventDefault();
        const prevSegment = prev.previousElementSibling;
        prev.remove();
        if (prevSegment && prevSegment.classList.contains('note-body-segment')) {
          const cursorPos = prevSegment.value.length;
          prevSegment.value += ta.value;
          ta.remove();
          activeSegment = prevSegment;
          prevSegment.focus();
          prevSegment.selectionStart = prevSegment.selectionEnd = cursorPos;
          autoResize(prevSegment);
        }
      }
    } else if (e.key === 'Delete' && ta.selectionStart === ta.value.length && ta.selectionEnd === ta.value.length) {
      const next = ta.nextElementSibling;
      if (next && next.classList.contains('img-wrapper')) {
        e.preventDefault();
        const nextSegment = next.nextElementSibling;
        next.remove();
        if (nextSegment && nextSegment.classList.contains('note-body-segment')) {
          const cursorPos = ta.value.length;
          ta.value += nextSegment.value;
          nextSegment.remove();
          activeSegment = ta;
          ta.focus();
          ta.selectionStart = ta.selectionEnd = cursorPos;
          autoResize(ta);
        }
      }
    }
  }

  // Setup initial segment
  setupSegment(activeSegment);

  // ---- Helpers ----
  function getCurrentLineRange(textarea) {
    const val = textarea.value;
    const pos = textarea.selectionStart;
    let lineStart = val.lastIndexOf('\n', pos - 1) + 1;
    let lineEnd = val.indexOf('\n', pos);
    if (lineEnd === -1) lineEnd = val.length;
    return { lineStart, lineEnd, line: val.substring(lineStart, lineEnd) };
  }

  function insertAtCursor(textarea, text) {
    const start = textarea.selectionStart;
    const end = textarea.selectionEnd;
    textarea.value = textarea.value.substring(0, start) + text + textarea.value.substring(end);
    textarea.selectionStart = textarea.selectionEnd = start + text.length;
    textarea.focus();
    autoResize(textarea);
  }

  // ---- Popups ----
  function closeAllPopups() {
    document.querySelectorAll('.popup-menu').forEach(p => p.classList.remove('show'));
  }
  function togglePopup(id) {
    const popup = document.getElementById(id);
    const wasOpen = popup.classList.contains('show');
    closeAllPopups();
    if (!wasOpen) popup.classList.add('show');
  }
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.popup-menu') && !e.target.closest('.toolbar-icon-btn')) closeAllPopups();
  });

  // ---- 1. List Formatting ----
  document.getElementById('btn-format').addEventListener('click', (e) => {
    e.stopPropagation();
    togglePopup('popup-format');
  });

  document.getElementById('popup-format').addEventListener('click', (e) => {
    const btn = e.target.closest('.popup-menu-item');
    if (!btn || !activeSegment) return;
    const format = btn.dataset.format;
    const val = activeSegment.value;
    const start = activeSegment.selectionStart;
    const end = activeSegment.selectionEnd;

    let selStart = val.lastIndexOf('\n', start - 1) + 1;
    let selEnd = val.indexOf('\n', end);
    if (selEnd === -1) selEnd = val.length;
    const lines = val.substring(selStart, selEnd).split('\n');
    const stripped = lines.map(line => line.replace(/^(\s*)(•\s|☐\s|☑\s|\d+\.\s)/, '$1'));

    let newLines;
    if (format === 'bullet') newLines = stripped.map(l => '• ' + l.trimStart());
    else if (format === 'number') newLines = stripped.map((l, i) => `${i + 1}. ` + l.trimStart());
    else if (format === 'checklist') newLines = stripped.map(l => '☐ ' + l.trimStart());
    else newLines = stripped.map(l => l.trimStart());

    const newText = newLines.join('\n');
    activeSegment.value = val.substring(0, selStart) + newText + val.substring(selEnd);
    activeSegment.selectionStart = activeSegment.selectionEnd = selStart + newText.length;
    activeSegment.focus();
    autoResize(activeSegment);
    closeAllPopups();
  });

  // Auto-continue list on Enter
  function handleListKeydown(e) {
    if (e.key !== 'Enter') return;
    const ta = e.target;
    const val = ta.value;
    const pos = ta.selectionStart;
    const { lineStart, line } = getCurrentLineRange(ta);

    let prefix = null;
    let numberMatch = null;
    if (line.match(/^• .+/)) prefix = '• ';
    else if ((numberMatch = line.match(/^(\d+)\. .+/))) prefix = (parseInt(numberMatch[1]) + 1) + '. ';
    else if (line.match(/^[☐☑] .+/)) prefix = '☐ ';

    if (!prefix) return;

    const justPrefix = line === '• ' || line.match(/^\d+\. $/) || line === '☐ ' || line === '☑ ';
    if (justPrefix) {
      e.preventDefault();
      ta.value = val.substring(0, lineStart) + val.substring(pos);
      ta.selectionStart = ta.selectionEnd = lineStart;
      autoResize(ta);
      return;
    }

    e.preventDefault();
    const insert = '\n' + prefix;
    ta.value = val.substring(0, pos) + insert + val.substring(pos);
    ta.selectionStart = ta.selectionEnd = pos + insert.length;
    autoResize(ta);
  }

  // Toggle checklist
  function handleChecklistToggle() {
    const ta = this;
    const { lineStart, lineEnd, line } = getCurrentLineRange(ta);
    if (line.startsWith('☐ ')) {
      ta.value = ta.value.substring(0, lineStart) + '☑ ' + line.substring(2) + ta.value.substring(lineEnd);
      ta.selectionStart = ta.selectionEnd = lineStart + 2;
    } else if (line.startsWith('☑ ')) {
      ta.value = ta.value.substring(0, lineStart) + '☐ ' + line.substring(2) + ta.value.substring(lineEnd);
      ta.selectionStart = ta.selectionEnd = lineStart + 2;
    }
  }

  // ---- 2. Attachment — insert image at cursor ----
  document.getElementById('btn-attach').addEventListener('click', () => {
    closeAllPopups();
    fileInput.click();
  });

  fileInput.addEventListener('change', () => {
    for (const file of fileInput.files) {
      if (!file.type.startsWith('image/')) continue;
      const reader = new FileReader();
      reader.onload = (e) => insertImageAtCursor(e.target.result);
      reader.readAsDataURL(file);
    }
    fileInput.value = '';
  });

  function insertImageAtCursor(src) {
    if (!activeSegment) return;

    const ta = activeSegment;
    const pos = ta.selectionStart;
    const before = ta.value.substring(0, pos);
    const after = ta.value.substring(pos);

    // Set current segment to text before cursor
    ta.value = before;
    autoResize(ta);

    // Create image wrapper
    const wrapper = document.createElement('div');
    wrapper.className = 'img-wrapper';
    const img = document.createElement('img');
    img.src = src;
    const removeBtn = document.createElement('button');
    removeBtn.className = 'img-remove';
    removeBtn.textContent = '×';
    removeBtn.addEventListener('click', () => {
      // Merge the segments around the removed image
      const prev = wrapper.previousElementSibling;
      const next = wrapper.nextElementSibling;
      if (prev && next && prev.classList.contains('note-body-segment') && next.classList.contains('note-body-segment')) {
        prev.value = prev.value + next.value;
        autoResize(prev);
        next.remove();
        activeSegment = prev;
        prev.focus();
        prev.selectionStart = prev.selectionEnd = prev.value.length;
      }
      wrapper.remove();
    });
    wrapper.appendChild(img);
    wrapper.appendChild(removeBtn);

    // Create new segment for text after cursor
    const newSegment = createSegment(after);

    // Insert after current segment
    ta.after(wrapper);
    wrapper.after(newSegment);

    // Focus the new segment
    activeSegment = newSegment;
    newSegment.focus();
    newSegment.selectionStart = newSegment.selectionEnd = 0;
  }

  // ---- 3. Font size ----
  document.getElementById('btn-fontsize').addEventListener('click', (e) => {
    e.stopPropagation();
    togglePopup('popup-fontsize');
  });

  document.getElementById('popup-fontsize').addEventListener('click', (e) => {
    const btn = e.target.closest('.popup-menu-item');
    if (!btn) return;
    const size = btn.dataset.size;
    currentFontSize = size + 'px';
    // Apply to all segments
    bodyContainer.querySelectorAll('.note-body-segment').forEach(ta => {
      ta.style.fontSize = currentFontSize;
      autoResize(ta);
    });
    document.querySelectorAll('#popup-fontsize .popup-menu-item').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    closeAllPopups();
    showToast(`Font size: ${size}px`);
  });

  // ---- 4. Insert link ----
  document.getElementById('btn-link').addEventListener('click', () => {
    closeAllPopups();
    if (!activeSegment) return;
    const url = prompt('Enter URL:');
    if (!url) return;
    const label = prompt('Link text (optional):') || url;
    insertAtCursor(activeSegment, label + ' (' + url + ')');
  });

  // ---- Nav: Undo ----
  document.getElementById('btn-undo').addEventListener('click', () => {
    document.execCommand('undo');
  });

  // ---- Keyboard-aware toolbar (iOS) ----
  const toolbar = document.querySelector('.bottom-toolbar');
  const wrapper = document.getElementById('note-content-wrapper');
  if (window.visualViewport) {
    function onViewportChange() {
      const vv = window.visualViewport;
      const keyboardHeight = window.innerHeight - vv.height;
      if (keyboardHeight > 100) {
        toolbar.style.position = 'fixed';
        toolbar.style.bottom = keyboardHeight + 'px';
        toolbar.style.left = '0';
        toolbar.style.right = '0';
        toolbar.style.zIndex = '100';
        toolbar.style.background = '#fff';
        toolbar.style.paddingBottom = '8px';
        wrapper.style.paddingBottom = (toolbar.offsetHeight + 10) + 'px';
      } else {
        toolbar.style.position = '';
        toolbar.style.bottom = '';
        toolbar.style.left = '';
        toolbar.style.right = '';
        toolbar.style.zIndex = '';
        toolbar.style.background = '';
        toolbar.style.paddingBottom = '';
        wrapper.style.paddingBottom = '';
      }
    }
    window.visualViewport.addEventListener('resize', onViewportChange);
    window.visualViewport.addEventListener('scroll', onViewportChange);
  }

  // ---- Export to PNG ----
  document.getElementById('export-btn').addEventListener('click', async () => {
    const container = document.createElement('div');
    container.style.cssText = `
      position: absolute; left: -9999px; top: 0;
      width: 390px; background: #fff; padding: 12px 10px;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
    `;

    if (noteTitle.value.trim()) {
      const titleDiv = document.createElement('div');
      titleDiv.textContent = noteTitle.value;
      titleDiv.style.cssText = `
        font-size: 28px; font-weight: 700; color: #000;
        line-height: 1.3; padding-bottom: 8px;
        white-space: pre-wrap; word-break: break-word;
      `;
      container.appendChild(titleDiv);
    }

    // Iterate through body container children in order
    let hasContent = !!noteTitle.value.trim();
    for (const child of bodyContainer.children) {
      if (child.classList.contains('note-body-segment') && child.value.trim()) {
        hasContent = true;
        const bodyDiv = document.createElement('div');
        bodyDiv.style.cssText = `
          font-size: ${currentFontSize}; color: #000; line-height: 1.5;
          white-space: pre-wrap; word-break: break-word;
        `;
        child.value.split('\n').forEach((line, i) => {
          if (i > 0) bodyDiv.appendChild(document.createElement('br'));
          bodyDiv.appendChild(document.createTextNode(line));
        });
        container.appendChild(bodyDiv);
      } else if (child.classList.contains('img-wrapper')) {
        hasContent = true;
        const img = child.querySelector('img');
        if (img) {
          const clone = document.createElement('img');
          clone.src = img.src;
          clone.style.cssText = 'max-width: 100%; border-radius: 8px; margin: 6px 0; display: block;';
          container.appendChild(clone);
        }
      }
    }

    if (!hasContent) { showToast('Nothing to export'); return; }

    document.body.appendChild(container);

    try {
      const canvas = await html2canvas(container, {
        backgroundColor: '#fff', scale: 2, useCORS: true, logging: false,
      });
      container.remove();
      const link = document.createElement('a');
      link.download = `note-${Date.now()}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
      showToast('PNG exported!');
    } catch (err) {
      container.remove();
      showToast('Export failed: ' + err.message);
    }
  });
</script>
</body>
</html>
